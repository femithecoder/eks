datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local
        jsonData:
          httpHeaderName1: X-Scope-OrgID
          timeInterval: 30s
        secureJsonData:
          httpHeaderValue1: "1"
