config:
  clients:
    - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push
      tenant_id: "1"

promtailExtraScrapeConfigs: |
  - job_name: kubernetes-pods-name
    pipeline_stages:
      - multiline:
          firstline: '^(?:\S+\s+){4}\['
    static_configs:
      - targets:
          - localhost
        labels:
          job: pods
          __path__: /var/log/pods/*/*/*.log
          __path_exclude__: /var/log/pods/*/loki*/*.log
